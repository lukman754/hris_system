            try {
                const dataHandler = {
                    onDataChanged(data) {
                        // Update allData with server data
                        allData = [...demoData, ...data];
                        
                        // Refresh current view if needed
                        if (currentUser) {
                            const currentPage = document.getElementById('pageTitle').textContent;
                            // Refresh specific pages that depend on data
                            if (currentPage.includes('Dashboard')) {
                                showDashboard();
                            }
                        }
                    }
                };
                
                const result = await window.dataSdk.init(dataHandler);
                if (result.isOk) {
                    console.log('Data SDK initialized successfully');
                } else {
                    console.log('Data SDK initialization failed');
                }
            } catch (error) {
                console.log('Data SDK not available');
            }
        }

        // Update date/time display
        function updateDateTime() {
            const now = new Date();
            const dateTimeElement = document.getElementById('currentDateTime');
            if (dateTimeElement) {
                dateTimeElement.textContent = now.toLocaleString('id-ID', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
        }

        // Setup login form
        function setupLoginForm() {
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', handleLogin);
            }
        }

        // Handle login
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            // Find user in demo data
            const user = allData.find(item => 
                item.type === 'user' && 
                item.email === email && 
                item.password === password
            );
            
            if (user) {
                currentUser = user;
                showMainApp();
                showNotification(`Selamat datang, ${user.name}!`, 'success');
            } else {
                errorDiv.textContent = 'Email atau password salah. Gunakan demo credentials yang tersedia.';
                errorDiv.classList.remove('hidden');
            }
        }

        // Show main application
        function showMainApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            // Update user info
            const userInfo = document.getElementById('userInfo');
            if (userInfo) {
                userInfo.textContent = `${currentUser.name} - ${currentUser.role.toUpperCase()}`;
            }
            
            // Setup menu
            setupMenu();
            
            // Setup logout
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', handleLogout);

        // Enhanced notification system
        function showNotification(message, type = 'info', duration = 5000) {
            const colors = {
                success: 'bg-green-50 border-green-500 text-green-700',
                error: 'bg-red-50 border-red-500 text-red-700',
                warning: 'bg-yellow-50 border-yellow-500 text-yellow-700',
                info: 'bg-blue-50 border-blue-500 text-blue-700'
            };
            
            const icons = {
                success: 'fas fa-check-circle text-green-500',
                error: 'fas fa-exclamation-circle text-red-500',
                warning: 'fas fa-exclamation-triangle text-yellow-500',
                info: 'fas fa-info-circle text-blue-500'
            };
            
            const notification = document.createElement('div');
            notification.className = `notification fixed top-4 right-4 ${colors[type]} border-l-4 p-4 rounded-lg shadow-xl z-50 max-w-sm fade-in`;
            notification.innerHTML = `
                <div class="flex items-start">
                    <i class="${icons[type]} mr-3 mt-0.5"></i>
                    <div class="flex-1">
                        <p class="text-sm font-medium">${message}</p>
                    </div>
                    <button onclick="this.closest('.notification').remove()" class="ml-3 text-gray-400 hover:text-gray-600 transition-colors">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
            document.body.appendChild(notification);
            
            // Auto hide
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.style.opacity = '0';
                    notification.style.transform = 'translateX(100%)';
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.parentNode.removeChild(notification);
                        }
                    }, 300);
                }
            }, duration);
        }

        function calculatePayroll() {
            const month = parseInt(document.getElementById('payrollMonth').value);
            const year = parseInt(document.getElementById('payrollYear').value);
            const employees = allData.filter(item => item.type === 'user' && item.role === 'employee');
            
            const payrollData = employees.map(emp => {
                // Calculate attendance for the month
                const monthAttendance = allData.filter(att => 
                    att.type === 'attendance' && 
                    att.userId === emp.id &&
                    new Date(att.timestamp).getMonth() === month &&
                    new Date(att.timestamp).getFullYear() === year
                );
                
                const workDays = monthAttendance.length;
                const expectedWorkDays = 22; // Assuming 22 work days per month
                const dailyWage = parseInt(defaultConfig.daily_wage);
                const overtimeRate = parseInt(defaultConfig.overtime_rate);
                
                // Basic calculations
                const basicSalary = workDays * dailyWage;
                const attendanceBonus = workDays >= expectedWorkDays ? 500000 : 0;
                const overtime = Math.max(0, workDays - expectedWorkDays) * overtimeRate;
                const grossSalary = basicSalary + attendanceBonus + overtime;
                
                // Deductions
                const tax = grossSalary * 0.05; // 5% tax
                const insurance = 200000; // Fixed insurance
                const totalDeductions = tax + insurance;
                
                const netSalary = grossSalary - totalDeductions;
                
                return {
                    employee: emp,
                    workDays,
                    expectedWorkDays,
                    basicSalary,
                    attendanceBonus,
                    overtime,
                    grossSalary,
                    tax,
                    insurance,
                    totalDeductions,
                    netSalary
                };
            });
            
            const monthName = new Date(year, month).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            
            document.getElementById('payrollResults').innerHTML = `

        function generatePayslip(employeeId, month, year) {
            const employee = allData.find(item => item.id === employeeId);
            if (!employee) return;
            
            // Recalculate payroll for this employee
            const monthAttendance = allData.filter(att => 
                att.type === 'attendance' && 
                att.userId === employeeId &&
                new Date(att.timestamp).getMonth() === month &&
                new Date(att.timestamp).getFullYear() === year
            );
            
            const workDays = monthAttendance.length;
            const expectedWorkDays = 22;
            const dailyWage = parseInt(defaultConfig.daily_wage);
            const overtimeRate = parseInt(defaultConfig.overtime_rate);
            
            const basicSalary = workDays * dailyWage;
            const attendanceBonus = workDays >= expectedWorkDays ? 500000 : 0;
            const overtime = Math.max(0, workDays - expectedWorkDays) * overtimeRate;
            const grossSalary = basicSalary + attendanceBonus + overtime;
            
            const tax = grossSalary * 0.05;
            const insurance = 200000;
            const totalDeductions = tax + insurance;
            const netSalary = grossSalary - totalDeductions;
            
            const monthName = new Date(year, month).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            
            // Generate PDF
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header
            doc.setFontSize(16);
            doc.text('SLIP GAJI KARYAWAN', 20, 20);
            doc.setFontSize(12);
            doc.text(defaultConfig.company_name, 20, 30);
            doc.text(defaultConfig.office_location, 20, 35);
            
            // Employee Info
            doc.setFontSize(14);
            doc.text('INFORMASI KARYAWAN', 20, 50);
            doc.setFontSize(10);
            doc.text(`Nama: ${employee.name}`, 20, 60);
            doc.text(`Posisi: ${employee.position}`, 20, 65);
            doc.text(`Departemen: ${employee.department}`, 20, 70);
            doc.text(`Periode: ${monthName}`, 20, 75);
            
            // Salary Details
            doc.setFontSize(14);
            doc.text('RINCIAN GAJI', 20, 90);
            
            const salaryData = [
                ['Hari Kerja', `${workDays}/${expectedWorkDays} hari`],
                ['Gaji Pokok', `Rp ${basicSalary.toLocaleString('id-ID')}`],
                ['Bonus Kehadiran', `Rp ${attendanceBonus.toLocaleString('id-ID')}`],
                ['Lembur', `Rp ${overtime.toLocaleString('id-ID')}`],
                ['GAJI KOTOR', `Rp ${grossSalary.toLocaleString('id-ID')}`],
                ['', ''],
                ['Pajak (5%)', `Rp ${tax.toLocaleString('id-ID')}`],
                ['Asuransi', `Rp ${insurance.toLocaleString('id-ID')}`],
                ['TOTAL POTONGAN', `Rp ${totalDeductions.toLocaleString('id-ID')}`],
                ['', ''],
                ['GAJI BERSIH', `Rp ${netSalary.toLocaleString('id-ID')}`]
            ];
            
            doc.autoTable({
                body: salaryData,
                startY: 95,
                styles: { fontSize: 10 },
                columnStyles: {
                    0: { fontStyle: 'bold', cellWidth: 80 },
                    1: { cellWidth: 80, halign: 'right' }
                }
            });
            
            // Footer
            const finalY = doc.lastAutoTable.finalY + 20;
            doc.text(`Dicetak pada: ${new Date().toLocaleDateString('id-ID')}`, 20, finalY);
            doc.text('HRD Department', 140, finalY + 20);
            doc.text('_________________', 140, finalY + 30);
            
            doc.save(`slip-gaji-${employee.name.replace(/\s+/g, '-')}-${monthName.replace(/\s+/g, '-')}.pdf`);
            showNotification('Slip gaji berhasil didownload!', 'success');
        }

        function exportPayrollReport(month, year) {
            const monthName = new Date(year, month).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header
            doc.setFontSize(16);
            doc.text('LAPORAN PENGGAJIAN', 20, 20);
            doc.setFontSize(12);
            doc.text(defaultConfig.company_name, 20, 30);
            doc.text(`Periode: ${monthName}`, 20, 35);
            doc.text(`Dicetak pada: ${new Date().toLocaleDateString('id-ID')}`, 20, 40);
            
            // Recalculate all payroll data
            const employees = allData.filter(item => item.type === 'user' && item.role === 'employee');
            const payrollData = employees.map(emp => {
                const monthAttendance = allData.filter(att => 
                    att.type === 'attendance' && 
                    att.userId === emp.id &&
                    new Date(att.timestamp).getMonth() === month &&
                    new Date(att.timestamp).getFullYear() === year
                );
                
                const workDays = monthAttendance.length;
                const expectedWorkDays = 22;
                const dailyWage = parseInt(defaultConfig.daily_wage);
                const overtimeRate = parseInt(defaultConfig.overtime_rate);
                
                const basicSalary = workDays * dailyWage;
                const attendanceBonus = workDays >= expectedWorkDays ? 500000 : 0;
                const overtime = Math.max(0, workDays - expectedWorkDays) * overtimeRate;
                const grossSalary = basicSalary + attendanceBonus + overtime;
                
                const tax = grossSalary * 0.05;
                const insurance = 200000;
                const totalDeductions = tax + insurance;
                const netSalary = grossSalary - totalDeductions;
                
                return [
                    emp.name,
                    `${workDays}/${expectedWorkDays}`,
                    `Rp ${basicSalary.toLocaleString('id-ID')}`,
                    `Rp ${(attendanceBonus + overtime).toLocaleString('id-ID')}`,
                    `Rp ${grossSalary.toLocaleString('id-ID')}`,
                    `Rp ${totalDeductions.toLocaleString('id-ID')}`,
                    `Rp ${netSalary.toLocaleString('id-ID')}`
                ];
            });
            
            doc.autoTable({
                head: [['Nama', 'Hari Kerja', 'Gaji Pokok', 'Tunjangan', 'Gaji Kotor', 'Potongan', 'Gaji Bersih']],
                body: payrollData,
                startY: 50,
                styles: { fontSize: 8 },
                headStyles: { fillColor: [59, 130, 246] }
            });
            
            doc.save(`laporan-gaji-${monthName.replace(/\s+/g, '-')}.pdf`);
            showNotification('Laporan gaji berhasil diexport!', 'success');
        }

        function setupNotificationListeners() {
            const bell = document.getElementById('notificationBell');
            const dropdown = document.getElementById('notificationDropdown');
            const markAllRead = document.getElementById('markAllRead');
            
            if (bell && dropdown) {
                bell.addEventListener('click', (e) => {
                    e.stopPropagation();
                    dropdown.classList.toggle('hidden');
                });
                
                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!bell.contains(e.target) && !dropdown.contains(e.target)) {
                        dropdown.classList.add('hidden');
                    }
                });
            }
            
            if (markAllRead) {
                markAllRead.addEventListener('click', markAllNotificationsRead);
            }
        }

        function updateNotifications() {
            const notifications = generateNotifications();
            const unreadCount = notifications.filter(n => !n.read).length;
            
            // Update badge
            const badge = document.getElementById('notificationBadge');
            if (badge) {
                if (unreadCount > 0) {
                    badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
            
            // Update notification list
            const notificationList = document.getElementById('notificationList');
            if (notificationList) {
                if (notifications.length === 0) {
                    notificationList.innerHTML = `
                        <div class="p-8 text-center">
                            <i class="fas fa-bell-slash text-gray-300 text-3xl mb-2"></i>
                            <p class="text-gray-500">Tidak ada notifikasi</p>
                        </div>
                    `;
                } else {
                    notificationList.innerHTML = notifications.slice(0, 10).map(notification => `
                        <div class="notification-item p-4 border-b hover:bg-gray-50 cursor-pointer ${notification.read ? 'opacity-60' : ''}" 
                             onclick="handleNotificationClick('${notification.id}', '${notification.action}')">
                            <div class="flex items-start">
                                <div class="flex-shrink-0 mr-3">
                                    <i class="fas fa-${notification.icon} text-${notification.color}-500"></i>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p class="text-sm font-medium text-gray-900">${notification.title}</p>
                                    <p class="text-xs text-gray-600 mt-1">${notification.message}</p>
                                    <p class="text-xs text-gray-400 mt-1">${notification.time}</p>
                                </div>
                                ${!notification.read ? '<div class="w-2 h-2 bg-blue-500 rounded-full ml-2"></div>' : ''}
                            </div>
                        </div>
                    `).join('');
                }
            }
        }

        function generateNotifications() {
            const notifications = [];
            const now = new Date();
            
            // Pending leave approvals (for HRD)
            if (currentUser.role === 'hrd') {
                const pendingLeaves = allData.filter(item => 
                    item.type === 'leave' && item.status === 'pending'
                );
                
                pendingLeaves.forEach(leave => {
                    notifications.push({
                        id: `leave_${leave.id}`,
                        title: 'Pengajuan Izin Baru',
                        message: `${leave.name} mengajukan izin ${getLeaveTypeText(leave.leaveType)}`,
                        time: getRelativeTime(leave.timestamp),
                        icon: 'calendar-times',
                        color: 'orange',
                        action: 'leave-approvals',
                        read: false
                    });
                });
                
                // Pending photo attendance approvals
                const pendingPhotoAttendance = allData.filter(item => 
                    item.type === 'attendance' && 
                    item.attendanceType === 'photo' && 
                    item.approved === null
                );
                
                pendingPhotoAttendance.forEach(att => {
                    notifications.push({
                        id: `photo_${att.id}`,
                        title: 'Absensi Foto Perlu Approval',
                        message: `${att.name} melakukan absensi dengan foto`,
                        time: getRelativeTime(att.timestamp),
                        icon: 'camera',
                        color: 'blue',
                        action: 'photo-approvals',
                        read: false
                    });
                });
            }
            
            // Today's birthdays
            const employees = allData.filter(item => item.type === 'user' && item.role === 'employee');
            const todayBirthdays = getTodayBirthdays(employees);
            
            todayBirthdays.forEach(emp => {
                notifications.push({
                    id: `birthday_${emp.id}`,
                    title: 'Ulang Tahun Hari Ini! 🎂',
                    message: `${emp.name} berulang tahun ke-${calculateAge(emp.birthDate)}`,
                    time: 'Hari ini',
                    icon: 'birthday-cake',
                    color: 'pink',
                    action: 'birthday-tracker',
                    read: false
                });
            });
            
            // Today's work anniversaries
            const todayAnniversaries = getTodayAnniversaries(employees);
            
            todayAnniversaries.forEach(emp => {
                notifications.push({
                    id: `anniversary_${emp.id}`,
                    title: 'Work Anniversary! 🏆',
                    message: `${emp.name} merayakan ${calculateWorkYears(emp.joinDate)} tahun bekerja`,
                    time: 'Hari ini',
                    icon: 'award',
                    color: 'blue',
                    action: 'birthday-tracker',
                    read: false
                });
            });
            
            // Tomorrow's events
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowEvents = allData.filter(item => 
                item.type === 'event' && 
                new Date(item.date).toDateString() === tomorrow.toDateString()
            );
            
            tomorrowEvents.forEach(event => {
                notifications.push({
                    id: `event_${event.id}`,
                    title: 'Reminder: Event Besok',
                    message: `${event.title} - ${getEventCategoryText(event.category)}`,
                    time: 'Besok',
                    icon: 'calendar-alt',
                    color: 'green',
                    action: 'company-calendar',
                    read: false
                });
            });
            
            // Sort by time (newest first)
            return notifications.sort((a, b) => {
                if (a.time === 'Hari ini') return -1;
                if (b.time === 'Hari ini') return 1;
                if (a.time === 'Besok') return -1;
                if (b.time === 'Besok') return 1;
                return 0;
            });
        }

        // Helper Functions
        function getTodayBirthdays(employees) {
            const today = new Date();
            return employees.filter(emp => {
                if (!emp.birthDate) return false;
                const birthDate = new Date(emp.birthDate);
                return birthDate.getMonth() === today.getMonth() && 
                       birthDate.getDate() === today.getDate();
            });
        }

        function getTodayAnniversaries(employees) {
            const today = new Date();
            return employees.filter(emp => {
                if (!emp.joinDate) return false;
                const joinDate = new Date(emp.joinDate);
                return joinDate.getMonth() === today.getMonth() && 
                       joinDate.getDate() === today.getDate() &&
                       joinDate.getFullYear() < today.getFullYear();
            });
        }

        function getUpcomingEvents(employees) {
            const today = new Date();
            const thirtyDaysFromNow = new Date(today);
            thirtyDaysFromNow.setDate(thirtyDaysFromNow.getDate() + 30);
            
            const events = [];
            
            employees.forEach(emp => {
                // Birthdays
                if (emp.birthDate) {
                    const birthDate = new Date(emp.birthDate);
                    const thisYearBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
                    
                    if (thisYearBirthday > today && thisYearBirthday <= thirtyDaysFromNow) {
                        const daysUntil = Math.ceil((thisYearBirthday - today) / (1000 * 60 * 60 * 24));
                        events.push({
                            type: 'birthday',
                            name: emp.name,
                            position: emp.position,
                            date: thisYearBirthday,
                            daysUntil: daysUntil,
                            age: calculateAge(emp.birthDate) + 1
                        });
                    }
                }
                
                // Work anniversaries
                if (emp.joinDate) {
                    const joinDate = new Date(emp.joinDate);
                    const thisYearAnniversary = new Date(today.getFullYear(), joinDate.getMonth(), joinDate.getDate());
                    
                    if (thisYearAnniversary > today && thisYearAnniversary <= thirtyDaysFromNow && joinDate.getFullYear() < today.getFullYear()) {
                        const daysUntil = Math.ceil((thisYearAnniversary - today) / (1000 * 60 * 60 * 24));
                        events.push({
                            type: 'anniversary',
                            name: emp.name,
                            position: emp.position,
                            date: thisYearAnniversary,
                            daysUntil: daysUntil,
                            years: calculateWorkYears(emp.joinDate) + 1
                        });
                    }
                }
            });
            
            return events.sort((a, b) => a.daysUntil - b.daysUntil);
        }

        function calculateAge(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                age--;
            }
            
            return age;
        }

        function calculateWorkYears(joinDate) {
            const today = new Date();
            const join = new Date(joinDate);
            let years = today.getFullYear() - join.getFullYear();
            const monthDiff = today.getMonth() - join.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < join.getDate())) {
                years--;
            }
            
            return years;
        }

        function generateCalendarGrid(year, month, events) {
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());
            
            const days = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
            let html = '';
            
            // Header days
            days.forEach(day => {
                html += `<div class="p-2 text-center font-medium text-gray-500 text-sm">${day}</div>`;
            });
            
            // Calendar days
            const currentDate = new Date(startDate);
            for (let i = 0; i < 42; i++) {
                const isCurrentMonth = currentDate.getMonth() === month;
                const isToday = currentDate.toDateString() === new Date().toDateString();
                const dayEvents = events.filter(event => 
                    new Date(event.date).toDateString() === currentDate.toDateString()
                );
                
                html += `
                    <div class="calendar-day min-h-[80px] p-1 border border-gray-200 ${isCurrentMonth ? 'bg-white' : 'bg-gray-50'} ${isToday ? 'bg-blue-50 border-blue-300' : ''}">
                        <div class="text-sm ${isCurrentMonth ? 'text-gray-900' : 'text-gray-400'} ${isToday ? 'font-bold text-blue-600' : ''} mb-1">
                            ${currentDate.getDate()}
                        </div>
                        <div class="space-y-1">
                            ${dayEvents.slice(0, 2).map(event => `
                                <div class="text-xs p-1 rounded ${getEventColor(event.category)} text-white truncate" title="${event.title}">
                                    ${event.title}
                                </div>
                            `).join('')}
                            ${dayEvents.length > 2 ? `<div class="text-xs text-gray-500">+${dayEvents.length - 2} lainnya</div>` : ''}
                        </div>
                    </div>
                `;
                
                currentDate.setDate(currentDate.getDate() + 1);
            }
            
            return html;
        }

        function getUpcomingCalendarEvents(events, days) {
            const today = new Date();
            const futureDate = new Date(today);
            futureDate.setDate(futureDate.getDate() + days);
            
            return events.filter(event => {
                const eventDate = new Date(event.date);
                return eventDate >= today && eventDate <= futureDate;
            }).sort((a, b) => new Date(a.date) - new Date(b.date));
        }

        function getEventStatistics(events) {
            const categories = ['meeting', 'holiday', 'training', 'other'];
            return categories.map(category => ({

            })).filter(stat => stat.count > 0);

        function getRelativeTime(timestamp) {
            const now = new Date();
            const time = new Date(timestamp);
            const diffInMinutes = Math.floor((now - time) / (1000 * 60));
            
            if (diffInMinutes < 1) return 'Baru saja';
            if (diffInMinutes < 60) return `${diffInMinutes} menit yang lalu`;
            
            const diffInHours = Math.floor(diffInMinutes / 60);
            if (diffInHours < 24) return `${diffInHours} jam yang lalu`;
            
            const diffInDays = Math.floor(diffInHours / 24);
            if (diffInDays < 7) return `${diffInDays} hari yang lalu`;
            
            return time.toLocaleDateString('id-ID');
        }

        function initializePerformanceChart(performanceData) {
            const ctx = document.getElementById('performanceChart');
            if (!ctx) return;
            
            const excellent = performanceData.filter(p => p.overallRating >= 4.0).length;
            const good = performanceData.filter(p => p.overallRating >= 3.0 && p.overallRating < 4.0).length;
            const needsImprovement = performanceData.filter(p => p.overallRating < 3.0).length;
            
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Excellent (4.0+)', 'Good (3.0-3.9)', 'Needs Improvement (<3.0)'],
                    datasets: [{
                        data: [excellent, good, needsImprovement],
                        backgroundColor: ['#10B981', '#3B82F6', '#F59E0B'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function initializeEmployeePerformanceChart(performance) {
            const ctx = document.getElementById('myPerformanceChart');
            if (!ctx) return;
            
            const ratings = JSON.parse(performance.ratings);
            const labels = Object.keys(ratings).map(key => getPerformanceMetricName(key));
            const data = Object.values(ratings);
            
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'My Performance',
                        data: data,
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        borderColor: 'rgb(59, 130, 246)',
                        pointBackgroundColor: 'rgb(59, 130, 246)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgb(59, 130, 246)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 5,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }

        function getPerformanceColor(rating) {
            if (rating >= 4.0) return 'text-green-600';
            if (rating >= 3.0) return 'text-blue-600';
            return 'text-yellow-600';
        }

        function getPerformanceMetricName(key) {
            const names = {
                workQuality: 'Work Quality',
                productivity: 'Productivity',
                communication: 'Communication',
                teamwork: 'Teamwork',
                initiative: 'Initiative',
                attendance: 'Attendance'
            };
            return names[key] || key;
        }

        // Calendar navigation functions
        function changeMonth(direction) {
            if (!window.currentCalendarMonth && !window.currentCalendarYear) {
                window.currentCalendarMonth = new Date().getMonth();
                window.currentCalendarYear = new Date().getFullYear();
            }
            
            window.currentCalendarMonth += direction;
            
            if (window.currentCalendarMonth > 11) {
                window.currentCalendarMonth = 0;
                window.currentCalendarYear++;
            } else if (window.currentCalendarMonth < 0) {
                window.currentCalendarMonth = 11;
                window.currentCalendarYear--;
            }
            
            // Update calendar display
            const events = allData.filter(item => item.type === 'event');
            const calendarTitle = document.getElementById('calendarTitle');
            const calendarGrid = document.getElementById('calendarGrid');
            
            if (calendarTitle) {
                calendarTitle.textContent = new Date(window.currentCalendarYear, window.currentCalendarMonth).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            }
            
            if (calendarGrid) {
                calendarGrid.innerHTML = generateCalendarGrid(window.currentCalendarYear, window.currentCalendarMonth, events);
            }
        }

        function exportAttendanceReport() {
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            
            let filteredData = allData.filter(item => item.type === 'attendance');
            
            if (startDate) {
                filteredData = filteredData.filter(att => new Date(att.timestamp) >= new Date(startDate));
            }
            
            if (endDate) {
                const endDateTime = new Date(endDate);
                endDateTime.setHours(23, 59, 59, 999);
                filteredData = filteredData.filter(att => new Date(att.timestamp) <= endDateTime);
            }
            
            // Create PDF using jsPDF
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Add title
            doc.setFontSize(16);
            doc.text('Laporan Absensi Karyawan', 20, 20);
            
            // Add date range

        async function approvePhoto(photoId) {
            const photo = allData.find(item => item.id === photoId);
            if (!photo) {
                showNotification('Data foto tidak ditemukan.', 'error');
                return;
            }
            
            // Show loading state
            const button = event.target;
            const originalText = button.innerHTML;
            button.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Memproses...';
            button.disabled = true;
            
            try {
                const updatedPhoto = { ...photo, approved: true };
                
                if (window.dataSdk) {
                    const result = await window.dataSdk.update(updatedPhoto);
                    if (result.isOk) {
                        showNotification(`Foto absensi ${photo.name} telah disetujui!`, 'success');
                        // Update local data immediately for better UX
                        const index = allData.findIndex(item => item.id === photoId);
                        if (index > -1) allData[index] = updatedPhoto;
                        showPhotoApprovals();
                    } else {
                        showNotification('Gagal menyetujui foto absensi: ' + result.error.message, 'error');
                    }
                } else {
                    const index = allData.findIndex(item => item.id === photoId);
                    if (index > -1) {
                        allData[index] = updatedPhoto;
                        showNotification(`Foto absensi ${photo.name} telah disetujui!`, 'success');
                        showPhotoApprovals();
                    } else {
                        showNotification('Gagal menemukan data foto.', 'error');
                    }
                }
            } catch (error) {
                showNotification('Gagal menyetujui foto absensi: ' + error.message, 'error');
            } finally {
                button.innerHTML = originalText;
                button.disabled = false;
            }
        }

        function calculatePayroll() {
            const month = parseInt(document.getElementById('payrollMonth').value);
            const year = parseInt(document.getElementById('payrollYear').value);
            const employees = allData.filter(item => item.type === 'user' && item.role === 'employee');
            
            const payrollData = employees.map(emp => {
                // Calculate attendance for the month
                const monthAttendance = allData.filter(att => 
                    att.type === 'attendance' && 
                    att.userId === emp.id &&
                    new Date(att.timestamp).getMonth() === month &&
                    new Date(att.timestamp).getFullYear() === year
                );
                
                const workDays = monthAttendance.length;
                const expectedWorkDays = 22; // Assuming 22 work days per month
                const dailyWage = parseInt(defaultConfig.daily_wage);
                const overtimeRate = parseInt(defaultConfig.overtime_rate);
                
                // Basic calculations
                const basicSalary = workDays * dailyWage;
                const attendanceBonus = workDays >= expectedWorkDays ? 500000 : 0;
                const overtime = Math.max(0, workDays - expectedWorkDays) * overtimeRate;
                const grossSalary = basicSalary + attendanceBonus + overtime;
                
                // Deductions
                const tax = grossSalary * 0.05; // 5% tax
                const insurance = 200000; // Fixed insurance
                const totalDeductions = tax + insurance;
                
                const netSalary = grossSalary - totalDeductions;
                
                return {
                    employee: emp,
                    workDays,
                    expectedWorkDays,
                    basicSalary,
                    attendanceBonus,
                    overtime,
                    grossSalary,
                    tax,
                    insurance,
                    totalDeductions,
                    netSalary
                };
            });
            
            const monthName = new Date(year, month).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            
            document.getElementById('payrollResults').innerHTML = `

                    <h4 class="text-lg font-semibold text-gray-900 mb-4">Perhitungan Gaji - ${monthName}</h4>

        function generatePayslip(employeeId, month, year) {
            const employee = allData.find(item => item.id === employeeId);
            if (!employee) return;
            
            // Recalculate payroll for this employee
            const monthAttendance = allData.filter(att => 
                att.type === 'attendance' && 
                att.userId === employeeId &&
                new Date(att.timestamp).getMonth() === month &&
                new Date(att.timestamp).getFullYear() === year
            );
            
            const workDays = monthAttendance.length;
            const expectedWorkDays = 22;
            const dailyWage = parseInt(defaultConfig.daily_wage);
            const overtimeRate = parseInt(defaultConfig.overtime_rate);
            
            const basicSalary = workDays * dailyWage;
            const attendanceBonus = workDays >= expectedWorkDays ? 500000 : 0;
            const overtime = Math.max(0, workDays - expectedWorkDays) * overtimeRate;
            const grossSalary = basicSalary + attendanceBonus + overtime;
            
            const tax = grossSalary * 0.05;
            const insurance = 200000;
            const totalDeductions = tax + insurance;
            const netSalary = grossSalary - totalDeductions;
            
            const monthName = new Date(year, month).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            
            // Generate PDF
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header
            doc.setFontSize(16);
            doc.text('SLIP GAJI KARYAWAN', 20, 20);
            doc.setFontSize(12);
            doc.text(defaultConfig.company_name, 20, 30);
            doc.text(defaultConfig.office_location, 20, 35);
            
            // Employee Info
            doc.setFontSize(14);
            doc.text('INFORMASI KARYAWAN', 20, 50);
            doc.setFontSize(10);
            doc.text(`Nama: ${employee.name}`, 20, 60);
            doc.text(`Posisi: ${employee.position}`, 20, 65);
            doc.text(`Departemen: ${employee.department}`, 20, 70);
            doc.text(`Periode: ${monthName}`, 20, 75);
            
            // Salary Details
            doc.setFontSize(14);
            doc.text('RINCIAN GAJI', 20, 90);
            
            const salaryData = [
                ['Hari Kerja', `${workDays}/${expectedWorkDays} hari`],
                ['Gaji Pokok', `Rp ${basicSalary.toLocaleString('id-ID')}`],
                ['Bonus Kehadiran', `Rp ${attendanceBonus.toLocaleString('id-ID')}`],
                ['Lembur', `Rp ${overtime.toLocaleString('id-ID')}`],
                ['GAJI KOTOR', `Rp ${grossSalary.toLocaleString('id-ID')}`],
                ['', ''],
                ['Pajak (5%)', `Rp ${tax.toLocaleString('id-ID')}`],
                ['Asuransi', `Rp ${insurance.toLocaleString('id-ID')}`],
                ['TOTAL POTONGAN', `Rp ${totalDeductions.toLocaleString('id-ID')}`],
                ['', ''],
                ['GAJI BERSIH', `Rp ${netSalary.toLocaleString('id-ID')}`]
            ];
            
            doc.autoTable({
                body: salaryData,
                startY: 95,
                styles: { fontSize: 10 },
                columnStyles: {
                    0: { fontStyle: 'bold', cellWidth: 80 },
                    1: { cellWidth: 80, halign: 'right' }
                }
            });
            
            // Footer
            const finalY = doc.lastAutoTable.finalY + 20;
            doc.text(`Dicetak pada: ${new Date().toLocaleDateString('id-ID')}`, 20, finalY);
            doc.text('HRD Department', 140, finalY + 20);
            doc.text('_________________', 140, finalY + 30);
            
            doc.save(`slip-gaji-${employee.name.replace(/\s+/g, '-')}-${monthName.replace(/\s+/g, '-')}.pdf`);
            showNotification('Slip gaji berhasil didownload!', 'success');
        }

        function exportPayrollReport(month, year) {
            const monthName = new Date(year, month).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header
            doc.setFontSize(16);
            doc.text('LAPORAN PENGGAJIAN', 20, 20);
            doc.setFontSize(12);
            doc.text(defaultConfig.company_name, 20, 30);
            doc.text(`Periode: ${monthName}`, 20, 35);
            doc.text(`Dicetak pada: ${new Date().toLocaleDateString('id-ID')}`, 20, 40);
            
            // Recalculate all payroll data
            const employees = allData.filter(item => item.type === 'user' && item.role === 'employee');
            const payrollData = employees.map(emp => {
                const monthAttendance = allData.filter(att => 
                    att.type === 'attendance' && 
                    att.userId === emp.id &&
                    new Date(att.timestamp).getMonth() === month &&
                    new Date(att.timestamp).getFullYear() === year
                );
                
                const workDays = monthAttendance.length;
                const expectedWorkDays = 22;
                const dailyWage = parseInt(defaultConfig.daily_wage);
                const overtimeRate = parseInt(defaultConfig.overtime_rate);
                
                const basicSalary = workDays * dailyWage;
                const attendanceBonus = workDays >= expectedWorkDays ? 500000 : 0;
                const overtime = Math.max(0, workDays - expectedWorkDays) * overtimeRate;
                const grossSalary = basicSalary + attendanceBonus + overtime;
                
                const tax = grossSalary * 0.05;
                const insurance = 200000;
                const totalDeductions = tax + insurance;
                const netSalary = grossSalary - totalDeductions;
                
                return [
                    emp.name,
                    `${workDays}/${expectedWorkDays}`,
                    `Rp ${basicSalary.toLocaleString('id-ID')}`,
                    `Rp ${(attendanceBonus + overtime).toLocaleString('id-ID')}`,
                    `Rp ${grossSalary.toLocaleString('id-ID')}`,
                    `Rp ${totalDeductions.toLocaleString('id-ID')}`,
                    `Rp ${netSalary.toLocaleString('id-ID')}`
                ];
            });
            
            doc.autoTable({
                head: [['Nama', 'Hari Kerja', 'Gaji Pokok', 'Tunjangan', 'Gaji Kotor', 'Potongan', 'Gaji Bersih']],
                body: payrollData,
                startY: 50,
                styles: { fontSize: 8 },
                headStyles: { fillColor: [59, 130, 246] }
            });
            
            doc.save(`laporan-gaji-${monthName.replace(/\s+/g, '-')}.pdf`);
            showNotification('Laporan gaji berhasil diexport!', 'success');
        }

        function showAnnouncementModal(announcementId = null) {
            const isEdit = announcementId !== null;
            const announcement = isEdit ? allData.find(item => item.id === announcementId) : null;
            
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 modal-backdrop flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow-2xl max-w-lg w-full mx-4 fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-semibold text-gray-900">
                            <i class="fas fa-bullhorn mr-2 text-blue-500"></i>${isEdit ? 'Edit Pengumuman' : 'Buat Pengumuman Baru'}
                        </h3>
                        <button onclick="this.closest('.modal-backdrop').remove()" class="text-gray-400 hover:text-gray-600">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                    
                    <form id="announcementForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Judul Pengumuman</label>
                            <input type="text" id="announcementTitle" value="${announcement ? announcement.title : ''}" required 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   placeholder="Masukkan judul pengumuman">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Prioritas</label>
                            <select id="announcementPriority" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="normal" ${announcement && announcement.priority === 'normal' ? 'selected' : ''}>Normal</option>
                                <option value="important" ${announcement && announcement.priority === 'important' ? 'selected' : ''}>Penting</option>
                                <option value="urgent" ${announcement && announcement.priority === 'urgent' ? 'selected' : ''}>Mendesak</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Isi Pengumuman</label>
                            <textarea id="announcementContent" rows="6" required 
                                      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                      placeholder="Tulis isi pengumuman di sini...">${announcement ? announcement.content : ''}</textarea>
                        </div>
                        
                        <div class="flex justify-end space-x-3">

                                    class="px-6 py-2 text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">

                            </button>
                            <button type="submit" class="btn-primary text-white px-6 py-2 rounded-lg font-medium">

                            </button>
                        </div>
                    </form>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            document.getElementById('announcementForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const announcementData = {
                    id: isEdit ? announcementId : `ann_${Date.now()}`,
                    type: 'announcement',
                    title: document.getElementById('announcementTitle').value,
                    content: document.getElementById('announcementContent').value,

                    modal.remove();
                    showAnnouncements();
                } catch (error) {
                    showNotification(`Gagal ${isEdit ? 'mengupdate' : 'mempublikasikan'} pengumuman.`, 'error');

        function deleteAnnouncement(announcementId) {
            const announcement = allData.find(item => item.id === announcementId);
            if (!announcement) return;
            
            const confirmDiv = document.createElement('div');
            confirmDiv.className = 'fixed inset-0 modal-backdrop flex items-center justify-center z-50';
            confirmDiv.innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow-2xl max-w-md w-full mx-4">

                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(confirmDiv);
        }

        function confirmDeleteAnnouncement(announcementId) {
            try {
                if (window.dataSdk) {
                    const announcement = allData.find(item => item.id === announcementId);
                    if (announcement) {
                        window.dataSdk.delete(announcement);
                    }
                } else {
                    const index = allData.findIndex(item => item.id === announcementId);
                    if (index > -1) allData.splice(index, 1);
                }
                
                showNotification('Pengumuman berhasil dihapus!', 'success');

                e.preventDefault();
                
                const trainingData = {
                    id: isEdit ? trainingId : `train_${Date.now()}`,
                    type: 'training',
                    title: document.getElementById('trainingTitle').value,
                    description: document.getElementById('trainingDescription').value,
                    startDate: document.getElementById('trainingStartDate').value,
                    endDate: document.getElementById('trainingEndDate').value,
                    instructor: document.getElementById('trainingInstructor').value,

                    timestamp: isEdit ? training.timestamp : new Date().toISOString(),
                    createdBy: currentUser.id
                };
                
                try {
                    if (window.dataSdk) {
                        if (isEdit) {

                }
            });

        function registerTraining(trainingId) {
            const training = allData.find(item => item.id === trainingId);
            if (!training) return;
            
            if (training.participants.includes(currentUser.id)) {
                showNotification('Anda sudah terdaftar dalam program ini.', 'warning');
                return;
            }
            
            if (training.participants.length >= training.capacity) {
                showNotification('Program training sudah penuh.', 'warning');
                return;
            }
            
            const updatedTraining = {
                ...training,
                participants: [...training.participants, currentUser.id]
            };
            
            try {
                if (window.dataSdk) {
                    window.dataSdk.update(updatedTraining);
                } else {
                    const index = allData.findIndex(item => item.id === trainingId);
                    if (index > -1) allData[index] = updatedTraining;
                }
                
                showNotification('Berhasil mendaftar program training!', 'success');
                showTrainingDevelopment();
            } catch (error) {
                showNotification('Gagal mendaftar program training.', 'error');
            }
        }

        function unregisterTraining(trainingId) {
            const training = allData.find(item => item.id === trainingId);
            if (!training) return;
            
            const updatedTraining = {
                ...training,
                participants: training.participants.filter(id => id !== currentUser.id)
            };
            
            try {
                if (window.dataSdk) {
                    window.dataSdk.update(updatedTraining);
                } else {
                    const index = allData.findIndex(item => item.id === trainingId);
                    if (index > -1) allData[index] = updatedTraining;
                }
                
                showNotification('Berhasil membatalkan pendaftaran.', 'info');
                showTrainingDevelopment();
            } catch (error) {
                showNotification('Gagal membatalkan pendaftaran.', 'error');
            }
        }

            showTrainingModal(trainingId);

        function deleteTraining(trainingId) {
            const training = allData.find(item => item.id === trainingId);
            if (!training) return;
            
            const confirmDiv = document.createElement('div');
            confirmDiv.className = 'fixed inset-0 modal-backdrop flex items-center justify-center z-50';
            confirmDiv.innerHTML = `

        function confirmDeleteTraining(trainingId) {
            try {
                if (window.dataSdk) {
                    const training = allData.find(item => item.id === trainingId);
                    if (training) {
                        window.dataSdk.delete(training);
                    }
                } else {
                    const index = allData.findIndex(item => item.id === trainingId);
                    if (index > -1) allData.splice(index, 1);

                showNotification('Program training berhasil dihapus!', 'success');
                showTrainingDevelopment();
            } catch (error) {
                showNotification('Gagal menghapus program training.', 'error');

        async function simulateQRScan() {

                    longitude: location.longitude,
                    accuracy: location.accuracy
                };

                if (window.dataSdk) {
                    const result = await window.dataSdk.create(attendanceRecord);

        async function capturePhoto() {

        function generatePhotoPlaceholder() {
            // Generate a simple colored rectangle as photo placeholder
            const canvas = document.createElement('canvas');
            canvas.width = 320;
            canvas.height = 240;
            const ctx = canvas.getContext('2d');
            
            // Create gradient background
            const gradient = ctx.createLinearGradient(0, 0, 320, 240);
            gradient.addColorStop(0, '#3B82F6');
            gradient.addColorStop(1, '#1D4ED8');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 320, 240);
            
            // Add user initial
            ctx.fillStyle = 'white';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(currentUser.name.charAt(0), 160, 140);
            
            // Add timestamp
            ctx.font = '12px Arial';
            ctx.fillText(new Date().toLocaleString('id-ID'), 160, 220);
            
            return canvas.toDataURL('image/jpeg', 0.8);
        }

        // Location Functions
        async function getCurrentLocationAsync() {
            return new Promise((resolve) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const lat = position.coords.latitude;
                            const lon = position.coords.longitude;
                            const distance = calculateDistance(lat, lon, OFFICE_COORDINATES.latitude, OFFICE_COORDINATES.longitude);
                            
                            resolve({
                                latitude: lat,
                                longitude: lon,
                                distance: Math.round(distance),
                                address: distance < 100 ? OFFICE_COORDINATES.address : 'Lokasi tidak dikenal',
                                accuracy: position.coords.accuracy
                            });
                        },
                        () => {
                            // Fallback to simulated location
                            resolve({
                                latitude: OFFICE_COORDINATES.latitude + (Math.random() - 0.5) * 0.01,
                                longitude: OFFICE_COORDINATES.longitude + (Math.random() - 0.5) * 0.01,
                                distance: Math.floor(Math.random() * 200) + 10,
                                address: 'Simulasi Lokasi Jakarta',
                                accuracy: 10
                            });
                        }
                    );
                } else {
                    // Fallback for browsers without geolocation
                    resolve({
                        latitude: OFFICE_COORDINATES.latitude,
                        longitude: OFFICE_COORDINATES.longitude,
                        distance: Math.floor(Math.random() * 100) + 5,
                        address: 'Simulasi Lokasi Jakarta',
                        accuracy: 50
                    });
                }
            });
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Earth's radius in meters
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c; // Distance in meters
        }

            `;
        }
